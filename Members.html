<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXON | Contributors</title>
    <link rel="icon" type="image/png" href="https://coin-images.coingecko.com/coins/images/677/large/basic-attention-token.png?1696501867">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); --accent: #9333ea; --bg: #050505; }
        html { zoom: 1.05; -moz-transform: scale(1.05); -moz-transform-origin: 0 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 100px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; margin: 0; background-image: radial-gradient(circle at 50% 0%, rgba(147, 51, 234, 0.12) 0%, transparent 50%), linear-gradient(180deg, #080808 0%, #050505 100%); background-attachment: fixed; min-height: 100vh; }
        .global-header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1300px; height: 60px; z-index: 2000; backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border); border-radius: 100px; display: flex; align-items: center; padding: 0 30px; }
        .header-content { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .h-left { display: flex; align-items: center; gap: 12px; }
        .h-logo { height: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
        .h-title { font-weight: 800; letter-spacing: 2px; font-size: 0.85rem; }
        .main-wrapper { padding-top: 140px; padding-bottom: 150px; max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; margin: 0; background: linear-gradient(to bottom, #fff 40%, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 0.7rem; color: #666; margin-top: 10px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }
        .contributors-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 20px; width: 100%; }
        .contributor-card { background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 35px; padding: 45px 30px; text-align: center; transition: all 0.4s ease; width: 280px; display: flex; flex-direction: column; align-items: center; }
        .contributor-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.05); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .contributor-card img { width: 140px; height: 140px; border-radius: 50%; margin-bottom: 25px; border: 2px solid var(--glass-border); object-fit: cover; transition: 0.4s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .contributor-card:hover img { border-color: var(--accent); transform: scale(1.05); }
        .contributor-card strong { font-size: 1.1rem; display: block; color: #fff; margin-bottom: 10px; }
        .role-tag { font-size: 0.6rem; color: #eeeeeecf; text-transform: uppercase; letter-spacing: 1.6px; font-weight: 300; background: rgba(103, 51, 234, 0.064); padding: 8px 15px; border-radius: 15px; border: 1px solid rgba(91, 51, 234, 0.093); line-height: 1.7; }
        .floating-nav-footer { position: fixed; bottom: 30px; left: 0; right: 0; margin: 0 auto; width: 90%; max-width: 750px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 100px; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #666; text-decoration: none; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        @media (max-width: 600px) { h1 { font-size: 2.5rem; } .h-title { display: none; } }
    </style>
</head>
<body>
    <nav class="global-header">
        <div class="header-content">
            <div class="h-left">
                <img src="https://coin-images.coingecko.com/coins/images/677/large/basic-attention-token.png?1696501867" class="h-logo">
                <span class="h-title">AXON</span>
            </div>
            <div class="version-tag" style="font-size: 0.6rem; color: #444; font-weight: 800; letter-spacing: 1px;">© 2026</div>
        </div>
    </nav>
    <div class="main-wrapper">
        <header>
            <h1>THE SQUAD</h1>

        <main class="contributors-grid">
            <div class="contributor-card"><img src="https://iili.io/qqif5ps.png" alt="Henry"><strong>Henry</strong><span class="role-tag">Web Developer<br>Slides Designer</span></div>
            <div class="contributor-card"><img src="https://iili.io/qq6Bt29.png" alt="Pisi"><strong>Pisi</strong><span class="role-tag">QA/Tester<br>Analyst</span></div>
            <div class="contributor-card"><img src="https://iili.io/qqPgZrX.png" alt="Swan Htet Zaw"><strong>Swan Htet Zaw</strong><span class="role-tag">Project Manager<br>Strategist</span></div>
            <div class="contributor-card"><img src="https://iili.io/qqifRvn.png" alt="Aw Chel"><strong>Aw Chel</strong><span class="role-tag">Asset Finder<br>Researcher</span></div>
            <div class="contributor-card"><img src="https://iili.io/qqPgQ1t.png" alt="Phyo"><strong>Phyo Maung</strong><span class="role-tag">Architect<br>Copywriter</span></div>
        </main>
    </div>
    <nav class="floating-nav-footer"><div style="font-size: 0.8rem; font-weight: 800; color: var(--accent);">AXON</div><div class="nav-links"><a href="index.html">Home</a><a href="About.html">About</a><a href="Members.html" class="active">Members</a><a href="Sources.html">Sources</a><a href="Lab.html">Lab</a><a href="FAQ.html">FAQ</a></div></nav>
</body>
</html>
